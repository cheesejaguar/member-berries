  <rect x="370" y="120" width="220" height="210" rx="16" fill="#182A24" stroke="#39FFB2"/>
  <text x="390" y="160" fill="#EAFBF5" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Pi extension</text>
